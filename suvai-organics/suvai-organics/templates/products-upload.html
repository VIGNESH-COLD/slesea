<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Management - Suvai Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <style>
    .product-row { transition: all 0.3s ease; }
    .product-row:hover { background-color: #f0f7e9; }
    .action-btn { transition: all 0.2s ease; }
    .action-btn:hover { transform: scale(1.1); }
  </style>
</head>
<body class="bg-gray-100 font-sans">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-green-800 text-white flex flex-col">
    <div class="p-6 text-2xl font-bold border-b border-green-700">Suvai Admin</div>
    <nav class="flex-1 p-4">
      <ul class="space-y-4">
         <li><a href="{{ url_for('admin_dashboard')}}" class="block p-2 rounded bg-green-700">📊 Dashboard</a></li>
        <li><a href="{{ url_for('products_upload')}}" class="block p-2 rounded hover:bg-green-700">🛒 Products</a></li>
        <li><a href="{{ url_for('farmers_manage')}}" class="block p-2 rounded hover:bg-green-700">👩‍🌾 Farmers</a></li>
        <li><a href="{{ url_for('gallery_manage')}}" class="block p-2 rounded hover:bg-green-700">🖼 Gallery</a></li>
        <li><a href="{{ url_for('partners_manage')}}" class="block p-2 rounded hover:bg-green-700">🤝 Partners</a></li>
      </ul>
    </nav>
    <div class="p-4 border-t border-green-700">
      <button class="w-full bg-red-500 py-2 rounded hover:bg-red-600">🚪 Logout</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 p-8 overflow-y-auto">
    <h1 class="text-3xl font-bold text-green-900 mb-6">🛒 Product Management</h1>

    <!-- Add/Edit Product Form -->
    <div class="bg-white p-6 rounded-lg shadow mb-6">
      <h2 class="text-xl font-semibold text-green-700 mb-4">➕ Add New Product</h2>
      <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-700 mb-2">Product Name</label>
          <input type="text" placeholder="Product Name" class="w-full p-2 border rounded" required>
        </div>
        
        <div>
          <label class="block text-gray-700 mb-2">Price (₹)</label>
          <input type="number" placeholder="Price" class="w-full p-2 border rounded" required min="0" step="0.01">
        </div>
        
        <div>
          <label class="block text-gray-700 mb-2">Category</label>
          <select class="w-full p-2 border rounded" required>
            <option value="">Select Category</option>
            <option value="Organic Grains">Organic Grains</option>
            <option value="Spices & Herbs">Spices & Herbs</option>
            <option value="Cold-pressed Oils">Cold-pressed Oils</option>
            <option value="Health Mixes">Health Mixes</option>
            <option value="Natural Sweeteners">Natural Sweeteners</option>
            <option value="Ready-to-eat Snacks">Ready-to-eat Snacks</option>
            <option value="Seasonal Produce">Seasonal Produce</option>
          </select>
        </div>
        
        <div>
          <label class="block text-gray-700 mb-2">Product Image</label>
          <input type="file" class="w-full p-2 border rounded">
        </div>
        
        <div class="md:col-span-2">
          <label class="block text-gray-700 mb-2">Description</label>
          <textarea placeholder="Product Description" class="w-full p-2 border rounded h-32" required></textarea>
        </div>
        
        <div class="md:col-span-2 flex justify-end">
          <button type="submit" class="bg-green-700 text-white px-6 py-2 rounded hover:bg-green-800">
            Add Product
          </button>
        </div>
      </form>
    </div>

    <!-- Product Table -->
    <div class="bg-white p-6 rounded-lg shadow">
      <h2 class="text-xl font-semibold text-green-700 mb-4">📋 Existing Products</h2>
      
      <table class="w-full border">
        <thead class="bg-green-100">
          <tr>
            <th class="border p-2">Position</th>
            <th class="border p-2">Image</th>
            <th class="border p-2">Name</th>
            <th class="border p-2">Price</th>
            <th class="border p-2">Category</th>
            <th class="border p-2">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr class="border-t product-row">
            <td class="border p-2 text-center">1</td>
            <td class="border p-2">
              <div class="bg-gray-200 border-2 border-dashed rounded-xl w-16 h-16 mx-auto"></div>
            </td>
            <td class="border p-2">Organic Millets</td>
            <td class="border p-2">₹120</td>
            <td class="border p-2">Grains</td>
            <td class="border p-2">
              <div class="flex flex-wrap gap-2 justify-center">
                <a href="#" class="action-btn bg-blue-500 text-white p-2 rounded hover:bg-blue-600" title="Edit">
                  <i class="fas fa-edit"></i>
                </a>
                <a href="#" class="action-btn bg-red-500 text-white p-2 rounded hover:bg-red-600" title="Delete">
                  <i class="fas fa-trash"></i>
                </a>
                <a href="#" class="action-btn bg-gray-500 text-white p-2 rounded hover:bg-gray-600 opacity-50 cursor-not-allowed" title="Move Up">
                  <i class="fas fa-arrow-up"></i>
                </a>
                <a href="#" class="action-btn bg-gray-500 text-white p-2 rounded hover:bg-gray-600" title="Move Down">
                  <i class="fas fa-arrow-down"></i>
                </a>
              </div>
            </td>
          </tr>
          <tr class="border-t product-row">
            <td class="border p-2 text-center">2</td>
            <td class="border p-2">
              <div class="bg-gray-200 border-2 border-dashed rounded-xl w-16 h-16 mx-auto"></div>
            </td>
            <td class="border p-2">Cold Pressed Coconut Oil</td>
            <td class="border p-2">₹250</td>
            <td class="border p-2">Oils</td>
            <td class="border p-2">
              <div class="flex flex-wrap gap-2 justify-center">
                <a href="#" class="action-btn bg-blue-500 text-white p-2 rounded hover:bg-blue-600" title="Edit">
                  <i class="fas fa-edit"></i>
                </a>
                <a href="#" class="action-btn bg-red-500 text-white p-2 rounded hover:bg-red-600" title="Delete">
                  <i class="fas fa-trash"></i>
                </a>
                <a href="#" class="action-btn bg-gray-500 text-white p-2 rounded hover:bg-gray-600" title="Move Up">
                  <i class="fas fa-arrow-up"></i>
                </a>
                <a href="#" class="action-btn bg-gray-500 text-white p-2 rounded hover:bg-gray-600" title="Move Down">
                  <i class="fas fa-arrow-down"></i>
                </a>
              </div>
            </td>
          </tr>
          <tr class="border-t product-row">
            <td class="border p-2 text-center">3</td>
            <td class="border p-2">
              <div class="bg-gray-200 border-2 border-dashed rounded-xl w-16 h-16 mx-auto"></div>
            </td>
            <td class="border p-2">Turmeric Powder</td>
            <td class="border p-2">₹180</td>
            <td class="border p-2">Spices</td>
            <td class="border p-2">
              <div class="flex flex-wrap gap-2 justify-center">
                <a href="#" class="action-btn bg-blue-500 text-white p-2 rounded hover:bg-blue-600" title="Edit">
                  <i class="fas fa-edit"></i>
                </a>
                <a href="#" class="action-btn bg-red-500 text-white p-2 rounded hover:bg-red-600" title="Delete">
                  <i class="fas fa-trash"></i>
                </a>
                <a href="#" class="action-btn bg-gray-500 text-white p-2 rounded hover:bg-gray-600" title="Move Up">
                  <i class="fas fa-arrow-up"></i>
                </a>
                <a href="#" class="action-btn bg-gray-500 text-white p-2 rounded hover:bg-gray-600 opacity-50 cursor-not-allowed" title="Move Down">
                  <i class="fas fa-arrow-down"></i>
                </a>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
</body>
</html>
