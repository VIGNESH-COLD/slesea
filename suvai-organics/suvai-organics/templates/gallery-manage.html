<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Management - Suvai Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-green-800 text-white flex flex-col">
    <div class="p-6 text-2xl font-bold border-b border-green-700">Suvai Admin</div>
    <nav class="flex-1 p-4">
      <ul class="space-y-4">
       <li><a href="{{ url_for('admin_dashboard')}}" class="block p-2 rounded bg-green-700">📊 Dashboard</a></li>
        <li><a href="{{ url_for('products_upload')}}" class="block p-2 rounded hover:bg-green-700">🛒 Products</a></li>
        <li><a href="{{ url_for('farmers_manage')}}" class="block p-2 rounded hover:bg-green-700">👩‍🌾 Farmers</a></li>
        <li><a href="{{ url_for('gallery_manage')}}" class="block p-2 rounded hover:bg-green-700">🖼 Gallery</a></li>
        <li><a href="{{ url_for('partners_manage')}}" class="block p-2 rounded hover:bg-green-700">🤝 Partners</a></li>
      </ul>
    </nav>
    <div class="p-4 border-t border-green-700">
      <button class="w-full bg-red-500 py-2 rounded hover:bg-red-600">🚪 Logout</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 p-8 overflow-y-auto">
    <h1 class="text-3xl font-bold text-green-900 mb-6">🖼 Gallery Management</h1>

    <!-- Upload Form -->
    <div class="bg-white p-6 rounded-lg shadow mb-6">
      <h2 class="text-xl font-semibold text-green-700 mb-4">📤 Upload New Photo</h2>
      <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="file" class="p-2 border rounded">
        <input type="text" placeholder="Caption (optional)" class="p-2 border rounded">
        <button type="submit" class="bg-green-700 text-white py-2 rounded hover:bg-green-800 col-span-1 md:col-span-2">Upload Photo</button>
      </form>
    </div>

    <!-- Gallery Grid -->
    <div class="bg-white p-6 rounded-lg shadow">
      <h2 class="text-xl font-semibold text-green-700 mb-4">📷 Existing Gallery</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="border rounded p-2 text-center">
          <img src="https://via.placeholder.com/150" class="w-full h-32 object-cover rounded mb-2">
          <button class="text-red-600 hover:underline">Delete</button>
        </div>
        <div class="border rounded p-2 text-center">
          <img src="https://via.placeholder.com/150" class="w-full h-32 object-cover rounded mb-2">
          <button class="text-red-600 hover:underline">Delete</button>
        </div>
      </div>
    </div>
  </main>

</div>
</body>
</html>
