<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - Suvai Organics</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-lg shadow-lg w-96">
    <h2 class="text-2xl font-bold text-green-800 mb-4 text-center">Admin Login</h2>

    <!-- 🔐 LOGIN FORM -->
    <form id="adminLoginForm" class="space-y-4">
      <div>
        <label class="block text-gray-700 font-medium mb-1">Username</label>
        <input type="text" id="username" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500" required>
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-1">Password</label>
        <input type="password" id="password" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500" required>
      </div>

      <!-- ❌ ERROR MESSAGE -->
      <p id="errorMsg" class="text-red-600 text-sm hidden">Invalid username or password</p>

      <button type="submit" class="w-full bg-green-700 text-white py-2 rounded hover:bg-green-800 transition">Login</button>
    </form>
  </div>

  <!-- ✅ LOGIN VALIDATION SCRIPT -->
  <script>
    const ADMIN_USER = "Admin@suvai_organics";
    const ADMIN_PASS = "suvai_1209";

    const form = document.getElementById("adminLoginForm");
    const errorMsg = document.getElementById("errorMsg");

    form.addEventListener("submit", function(e) {
      e.preventDefault(); // Stop default form submission

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (username === ADMIN_USER && password === ADMIN_PASS) {
        window.location.href = "admin-dashboard.html"; // ✅ NEW redirect target
      } else {
        errorMsg.classList.remove("hidden"); // ❌ Show error
      }
    });
  </script>

</body>
</html>
