<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Management - Suvai Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-green-800 text-white flex flex-col">
    <div class="p-6 text-2xl font-bold border-b border-green-700">Suvai Admin</div>
    <nav class="flex-1 p-4">
      <ul class="space-y-4">
        <li><a href="admin-dashboard.html" class="block p-2 rounded hover:bg-green-700">📊 Dashboard</a></li>
        <li><a href="products-upload.html" class="block p-2 rounded bg-green-700">🛒 Products</a></li>
        <li><a href="farmers-manage.html" class="block p-2 rounded hover:bg-green-700">👩‍🌾 Farmers</a></li>
        <li><a href="gallery-manage.html" class="block p-2 rounded hover:bg-green-700">🖼 Gallery</a></li>
        <li><a href="partners-manage.html" class="block p-2 rounded hover:bg-green-700">🤝 Partners</a></li>
      </ul>
    </nav>
    <div class="p-4 border-t border-green-700">
      <button class="w-full bg-red-500 py-2 rounded hover:bg-red-600">🚪 Logout</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 p-8 overflow-y-auto">
    <h1 class="text-3xl font-bold text-green-900 mb-6">🛒 Product Management</h1>

    <!-- Add Product Form -->
    <div class="bg-white p-6 rounded-lg shadow mb-6">
      <h2 class="text-xl font-semibold text-green-700 mb-4">➕ Add New Product</h2>
      <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" placeholder="Product Name" class="p-2 border rounded">
        <input type="number" placeholder="Price (₹)" class="p-2 border rounded">
        <input type="text" placeholder="Category" class="p-2 border rounded">
        <input type="file" class="p-2 border rounded">
        <textarea placeholder="Description" class="p-2 border rounded col-span-1 md:col-span-2"></textarea>
        <button type="submit" class="bg-green-700 text-white py-2 rounded hover:bg-green-800 col-span-1 md:col-span-2">Add Product</button>
      </form>
    </div>

    <!-- Product Table -->
    <div class="bg-white p-6 rounded-lg shadow">
      <h2 class="text-xl font-semibold text-green-700 mb-4">📋 Existing Products</h2>
      <table class="w-full border">
        <thead class="bg-green-100">
          <tr>
            <th class="border p-2">Name</th>
            <th class="border p-2">Price</th>
            <th class="border p-2">Category</th>
            <th class="border p-2">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr class="border-t">
            <td class="border p-2">Organic Millets</td>
            <td class="border p-2">₹120</td>
            <td class="border p-2">Grains</td>
            <td class="border p-2">
              <button class="text-blue-600 hover:underline">Edit</button> | 
              <button class="text-red-600 hover:underline">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

</div>
</body>
</html>
